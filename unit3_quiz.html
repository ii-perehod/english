function buildTestScreen() {

      </div>
    </div>`;
}

function updateQuestion() {
  if (testIdx >= currentWords.length) { showResults(); return; }
  const q = currentWords[testIdx];
  const askKey = chosenDir === 'en' ? 'en' : 'ru';
  const ansKey = chosenDir === 'en' ? 'ru' : 'en';
  const correctAns = q[ansKey];
  const pool = getPoolWords();
  let options = [correctAns];
  const others = shuffle(pool.filter(w => w[ansKey] !== correctAns).map(w => w[ansKey]));
  for (const o of others) {
    if (options.length >= 4) break;
    if (!options.includes(o)) options.push(o);
  }
  shuffle(options);
  document.getElementById('tCounter').textContent = (testIdx + 1) + ' / ' + currentWords.length;
  document.getElementById('tProgress').style.width = (testIdx / currentWords.length * 100) + '%';
  document.getElementById('tWord').textContent = q[askKey];
  document.getElementById('tTr').textContent = (chosenDir === 'en' && q.tr) ? q.tr : '';
  const ad = document.getElementById('tAnswers');
  ad.innerHTML = '';
  options.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.id = 'ans' + i;
    btn.textContent = o;
    btn.onclick = () => checkAnswer(i, o, correctAns);
    ad.appendChild(btn);
  });
  if (chosenDir === 'en') speak(q.en);
}

function checkAnswer(btnIdx, selected, correctAns) {
  const buttons = document.querySelectorAll('.answer-btn');
  buttons.forEach(b => {
    b.classList.add('disabled');
    if (b.textContent === correctAns) b.classList.add('correct-answer');
  });
  const btn = document.getElementById('ans' + btnIdx);
  if (selected === correctAns) {
    testCorrect++;
    testStreak++;
    if (testStreak > testMaxStreak) testMaxStreak = testStreak;
    emojiBurst(btn, ['ūüéČ','‚≠ź','‚ú®','ūüĒ•','ūüí™'][Math.floor(Math.random() * 5)]);
  } else {
    btn.classList.add('wrong-answer');
    testWrong++;
    testStreak = 0;
    testMistakes.push(currentWords[testIdx]);
  }
  document.getElementById('tStatOk').textContent = '‚úď ' + testCorrect;
  document.getElementById('tStatBad').textContent = '‚úó ' + testWrong;
  document.getElementById('tStatStreak').textContent = 'ūüĒ• ' + testStreak;
  testIdx++;
  setTimeout(updateQuestion, 900);
}

function showResults() {
  const total = currentWords.length;
  const pct = Math.round(testCorrect / total * 100);
  const isPerfect = pct === 100;
  let grade = '';
  if (isPerfect) grade = 'ūüŹÜ –ě—ā–Ľ–ł—á–Ĺ–ĺ! –í—Ā—Ď –Ņ—Ä–į–≤–ł–Ľ—Ć–Ĺ–ĺ!';
  else if (pct >= 80) grade = 'ūüėé –ö—Ä—É—ā–ĺ! –ü–ĺ—á—ā–ł –≤—Ā—Ď!';
  else if (pct >= 60) grade = 'ūüĎć –Ě–Ķ–Ņ–Ľ–ĺ—Ö–ĺ, –Ĺ–ĺ –Ņ–ĺ–≤—ā–ĺ—Ä–ł –ĺ—ą–ł–Ī–ļ–ł';
  else if (pct >= 40) grade = 'ūüďĖ –Ě–į–ī–ĺ –Ņ–ĺ–ī—É—á–ł—ā—Ć';
  else grade = 'ūüí™ –Ě–Ķ —Ā–ī–į–≤–į–Ļ—Ā—Ź, –Ņ–ĺ–Ņ—Ä–ĺ–Ī—É–Ļ –Ķ—Č—Ď!';

  let mistakesHtml = '';
  if (testMistakes.length > 0) {
    mistakesHtml = '<div class="mistakes-list">';
    testMistakes.forEach(m => {
      mistakesHtml += `<div class="m-row"><span class="m-en">${escH(m.en)}</span> <span style="color:#94a3b8;font-style:italic;font-size:0.85em">${escH(m.tr||'')}</span> ‚ÄĒ <span class="m-ru">${escH(m.ru)}</span></div>`;
    });
    mistakesHtml += '</div>';
  }

  const retryBtn = testMistakes.length > 0
    ? `<button class="big-btn big-btn-retry" onclick="retryMistakes()">–í—č—É—á–ł—ā—Ć –ĺ—ą–ł–Ī–ļ–ł (${testMistakes.length} —Ā–Ľ.)</button>`
    : '';
  const roundLabel = roundNum > 1 ? `<div class="round-badge">–†–į—É–Ĺ–ī ${roundNum}</div>` : '';

  app.innerHTML = `
    <div class="screen">
      ${roundLabel}
      <div class="result-grade">${grade}</div>
      <div class="result-pct">${pct}%</div>
      <div style="color:#94a3b8;margin-bottom:10px">${testCorrect} –ł–∑ ${total} –Ņ—Ä–į–≤–ł–Ľ—Ć–Ĺ–ĺ</div>
      ${mistakesHtml}
      <div class="btn-row">${retryBtn}</div>
      <div class="btn-row">
        ${!isPerfect ? '<button class="big-btn-outline" onclick="restartSameWords()">–ü—Ä–ĺ–Ļ—ā–ł —ā–Ķ—Ā—ā –∑–į–Ĺ–ĺ–≤–ĺ</button>' : ''}
        <button class="big-btn-outline" onclick="showModeChoice()">–ö –≤—č–Ī–ĺ—Ä—É —Ä–Ķ–∂–ł–ľ–į</button>
        <button class="big-btn-outline" onclick="showSetup()">–Ě–į –≥–Ľ–į–≤–Ĺ—É—é</button>
      </div>
    </div>
    ${isPerfect ? '<canvas id="fireworks" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999"></canvas>' : ''}`;
  if (isPerfect) launchFireworks();
}

function retryMistakes() {
  currentWords = [...testMistakes];
  roundNum++;
  showModeChoice();
}
function restartSameWords() { startTest(); }

// Fireworks

function launchFireworks() {
  const canvas = document.getElementById('fireworks');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = [];
  const colors = ['#a78bfa','#60a5fa','#4ade80','#fbbf24','#f87171','#fb923c','#e879f9','#22d3ee'];
  function createBurst(x, y) {
    const count = 40 + Math.floor(Math.random() * 30);
    const color = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, decay: 0.01+Math.random()*0.015, color, size: 2+Math.random()*3 });
    }
  }
  let burstCount = 0;
  const burstInterval = setInterval(() => {
    createBurst(canvas.width*0.2+Math.random()*canvas.width*0.6, canvas.height*0.15+Math.random()*canvas.height*0.4);
    burstCount++;
    if (burstCount >= 8) clearInterval(burstInterval);
  }, 400);
  createBurst(canvas.width/2, canvas.height*0.3);
  let animId;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.vx *= 0.99; p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (particles.length > 0 || burstCount < 8) animId = requestAnimationFrame(animate);
    else canvas.remove();
  }
  animate();
  setTimeout(() => { cancelAnimationFrame(animId); if (canvas.parentNode) canvas.remove(); }, 6000);
}

function emojiBurst(btn, emoji) {
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'emoji-burst';
  el.textContent = emoji;
  el.style.left = (rect.left + rect.width/2) + 'px';
  el.style.top = rect.top + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

let pronIdx = 0;
let recognition = null;

function startPronounce() {
  pronIdx = 0;
  buildPronScreen();
  showPronWord();
}

function buildPronScreen() {
  const roundLabel = roundNum > 1
    ? '<div class="round-badge">–†–į—É–Ĺ–ī ' + roundNum + ' ‚ÄĒ –Ņ–ĺ–≤—ā–ĺ—Ä –ĺ—ą–ł–Ī–ĺ–ļ (' + currentWords.length + ' —Ā–Ľ.)</div>'
    : '';
  app.innerHTML =
    '<div class="screen" style="animation:none">' +
      roundLabel +
      '<div class="flashcard-counter" id="prCounter"></div>' +
      '<div class="progress-wrap"><div class="progress-bar" id="prProgress" style="width:0%"></div></div>' +
      '<div style="color:#94a3b8;font-size:0.9em;margin-bottom:5px">–ü–ĺ—Ā–Ľ—É—ą–į–Ļ –ł –Ņ–ĺ–≤—ā–ĺ—Ä–ł:</div>' +
      '<div class="word" id="prWord"></div>' +
      '<div class="transcription" id="prTr"></div>' +
      '<div style="display:flex;gap:15px;justify-content:center;align-items:center">' +
        '<button class="mic-btn" id="prListenBtn" onclick="pronListen()" title="–ü–ĺ—Ā–Ľ—É—ą–į—ā—Ć">ūüĒä</button>' +
        '<button class="mic-btn" id="prMicBtn" onclick="pronRecord()" title="–ó–į–Ņ–ł—Ā–į—ā—Ć">ūüé§</button>' +
      '</div>' +
      '<div class="heard-text" id="prHeard"></div>' +
      '<div class="pr-result" id="prResult"></div>' +
      '<div class="btn-row" id="prBtnRow">' +
        '<button class="big-btn-outline" onclick="showModeChoice()">–ö –≤—č–Ī–ĺ—Ä—É —Ä–Ķ–∂–ł–ľ–į</button>' +
        '<button class="big-btn-outline" onclick="showSetup()">–Ě–į –≥–Ľ–į–≤–Ĺ—É—é</button>' +
      '</div>' +
    '</div>';
}

function showPronWord() {
  if (pronIdx >= currentWords.length) { showPronDone(); return; }
  const w = currentWords[pronIdx];
  document.getElementById('prCounter').textContent = (pronIdx+1) + ' / ' + currentWords.length;
  document.getElementById('prProgress').style.width = (pronIdx / currentWords.length * 100) + '%';
  document.getElementById('prWord').textContent = w.en;
  document.getElementById('prTr').textContent = w.tr || '';
  document.getElementById('prHeard').textContent = '';
  document.getElementById('prResult').textContent = '';
  document.getElementById('prResult').className = 'pr-result';
  document.getElementById('prMicBtn').classList.remove('recording');
  document.getElementById('prBtnRow').innerHTML =
    '<button class="big-btn-outline" onclick="showModeChoice()">–ö –≤—č–Ī–ĺ—Ä—É —Ä–Ķ–∂–ł–ľ–į</button>' +
    '<button class="big-btn-outline" onclick="showSetup()">–Ě–į –≥–Ľ–į–≤–Ĺ—É—é</button>';
  speak(w.en);
}

function pronListen() {
  const w = currentWords[pronIdx];
  if (w) speak(w.en);
}

function pronRecord() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('prHeard').textContent = '–Ď—Ä–į—É–∑–Ķ—Ä –Ĺ–Ķ –Ņ–ĺ–ī–ī–Ķ—Ä–∂–ł–≤–į–Ķ—ā —Ä–į—Ā–Ņ–ĺ–∑–Ĺ–į–≤–į–Ĺ–ł–Ķ —Ä–Ķ—á–ł. –ė—Ā–Ņ–ĺ–Ľ—Ć–∑—É–Ļ Chrome.';
    return;
  }
  if (recognition) { recognition.stop(); return; }
  const micBtn = document.getElementById('prMicBtn');
  micBtn.classList.add('recording');
  document.getElementById('prHeard').textContent = '–ď–ĺ–≤–ĺ—Ä–ł...';
  document.getElementById('prResult').textContent = '';
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.onresult = function(e) {
    let interim = '', final = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('prHeard').textContent = final || interim || '...';
    if (final) checkPronunciation(final, e.results);
  };
  recognition.onerror = function(e) {
    micBtn.classList.remove('recording');
    recognition = null;
    document.getElementById('prHeard').textContent = e.error === 'no-speech' ? '–Ě–Ķ —É—Ā–Ľ—č—ą–į–Ľ. –ü–ĺ–Ņ—Ä–ĺ–Ī—É–Ļ –Ķ—Č—Ď —Ä–į–∑.' : '–ě—ą–ł–Ī–ļ–į: ' + e.error;
  };
  recognition.onend = function() { micBtn.classList.remove('recording'); recognition = null; };
  recognition.start();
}

function checkPronunciation(heard, results) {
  const w = currentWords[pronIdx];
  const target = w.en.toLowerCase().trim();
  const heardClean = heard.toLowerCase().trim();
  let matched = false;
  for (let i = 0; i < results.length; i++) {
    for (let j = 0; j < results[i].length; j++) {
      if (results[i][j].transcript.toLowerCase().trim() === target) { matched = true; break; }
    }
  }
  if (heardClean === target) matched = true;
  if (target.includes(' ') && heardClean.includes(target)) matched = true;
  if (target.includes(' ') && target.includes(heardClean) && heardClean.length > 3) matched = true;
  const resultEl = document.getElementById('prResult');
  document.getElementById('prHeard').innerHTML = '–Ę—č —Ā–ļ–į–∑–į–Ľ: <b>' + escH(heard) + '</b>';
  if (matched) {
    resultEl.textContent = '–ě—ā–Ľ–ł—á–Ĺ–ĺ! ‚úď';
    resultEl.className = 'pr-result pr-ok';
    document.getElementById('prBtnRow').innerHTML =
      '<button class="big-btn" onclick="pronIdx++;showPronWord()">–Ē–į–Ľ–Ķ–Ķ ‚Üí</button>' +
      '<button class="big-btn-outline" onclick="showModeChoice()">–ö –≤—č–Ī–ĺ—Ä—É —Ä–Ķ–∂–ł–ľ–į</button>';
  } else {
    resultEl.textContent = '–ü–ĺ–Ņ—Ä–ĺ–Ī—É–Ļ –Ķ—Č—Ď —Ä–į–∑';
    resultEl.className = 'pr-result pr-fail';
    document.getElementById('prBtnRow').innerHTML =
      '<button class="big-btn" onclick="pronRecord()">ūüé§ –ē—Č—Ď —Ä–į–∑</button>' +
      '<button class="big-btn-outline" onclick="pronListen()">ūüĒä –ü–ĺ—Ā–Ľ—É—ą–į—ā—Ć</button>' +
      '<button class="big-btn-outline" onclick="pronIdx++;showPronWord()">–ü—Ä–ĺ–Ņ—É—Ā—ā–ł—ā—Ć ‚Üí</button>' +
      '<button class="big-btn-outline" onclick="showModeChoice()">–ö –≤—č–Ī–ĺ—Ä—É —Ä–Ķ–∂–ł–ľ–į</button>';
  }
}

function showPronDone() {
  app.innerHTML =
    '<div class="screen">' +
      '<div style="font-size:2.5em;margin:15px 0">ūüéČ</div>' +
      '<div style="font-size:1.3em;font-weight:600;margin-bottom:10px">–í—Ā–Ķ ' + currentWords.length + ' —Ā–Ľ–ĺ–≤ –ĺ—ā—Ä–į–Ī–ĺ—ā–į–Ĺ—č!</div>' +
      '<div style="color:#94a3b8;margin-bottom:20px">–ü—Ä–ĺ–ł–∑–Ĺ–ĺ—ą–Ķ–Ĺ–ł–Ķ —ā—Ä–Ķ–Ĺ–ł—Ä–ĺ–≤–į–Ĺ–ĺ</div>' +
      '<div class="btn-row">' +
        '<button class="big-btn" onclick="startPronounce()">–ē—Č—Ď —Ä–į–∑</button>' +
        '<button class="big-btn-outline" onclick="showModeChoice()">–ö –≤—č–Ī–ĺ—Ä—É —Ä–Ķ–∂–ł–ľ–į</button>' +
        '<button class="big-btn-outline" onclick="showSetup()">–Ě–į –≥–Ľ–į–≤–Ĺ—É—é</button>' +
      '</div>' +
    '</div>';
}
