<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>С Днём Рождения, Наташенька!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09071a;
    overflow: hidden;
    user-select: none;
    touch-action: none;
    font-family: Georgia, serif;
  }
  #canvas { display: block; position: fixed; top: 0; left: 0; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none; z-index: 20;
    padding: 20px; text-align: center;
  }
  .title {
    font-size: clamp(1.7em, 5.5vw, 3.5em);
    color: #fff;
    line-height: 1.3;
    letter-spacing: 0.02em;
    text-shadow:
      0 0 30px rgba(190,140,255,0.85),
      0 0 70px rgba(190,140,255,0.3),
      0 3px 8px rgba(0,0,0,0.9);
    opacity: 0;
    animation: fadeIn 2s ease forwards 0.5s;
  }
  .wish {
    margin-top: 16px;
    font-size: clamp(2.2em, 7vw, 3.2em);
    color: rgba(215,192,255,0.9);
    line-height: 1.6;
    max-width: 640px;
    font-style: italic;
    opacity: 0;
    animation: fadeIn 2s ease forwards 1.8s, wishPulse 4s ease-in-out infinite 4s;
  }
  @keyframes wishPulse {
    0%   { color: rgba(215,192,255,0.9); }
    17%  { color: rgba(255,160,160,0.9); }
    34%  { color: rgba(255,220,100,0.9); }
    51%  { color: rgba(130,240,195,0.9); }
    68%  { color: rgba(150,200,255,0.9); }
    85%  { color: rgba(255,185,220,0.9); }
    100% { color: rgba(215,192,255,0.9); }
  }
  #cta {
    margin-top: 28px;
    font-size: clamp(1.4em, 4vw, 2em);
    color: rgba(255,218,100,0.95);
    letter-spacing: 0.06em;
    text-shadow: 0 0 22px rgba(255,200,70,0.75), 0 0 50px rgba(255,200,70,0.3);
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  @keyframes ctaGlow {
    0%,100% { text-shadow: 0 0 22px rgba(255,200,70,0.75), 0 0 50px rgba(255,200,70,0.3); }
    50%      { text-shadow: 0 0 35px rgba(255,220,90,0.95), 0 0 70px rgba(255,200,70,0.5); }
  }
  #clearBtn {
    position: fixed; bottom: 14px; right: 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.38);
    font-family: Georgia, serif;
    font-size: 0.75em;
    letter-spacing: 0.07em;
    padding: 6px 15px;
    border-radius: 18px;
    cursor: pointer;
    z-index: 30;
    transition: all 0.2s;
  }
  #clearBtn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateX(-50%) translateY(0); }
    18%  { opacity: 1; }
    68%  { opacity: 1; transform: translateX(-50%) translateY(-30px); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-52px); }
  }
  #labels { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 30; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div class="title">Наташенька,<br>с Днём рождения!</div>
  <div class="wish">Пусть твой жизненный путь будет ярким,<br>как ты сама его создаёшь!</div>
  <div id="cta">🎆 Нажимай! 🎆</div>
</div>

<button id="clearBtn">✦ очистить</button>
<div id="labels"></div>

<script>
// ══════════════════════════════════════════════
//  ТРИ СЛОЯ:
//  bgCvs    — постоянный: осевшие лепестки, никогда не стираются
//  trailCvs — следы:      прозрачный фон, медленно угасает (destination-out)
//  canvas   — итог:       фон + bgCvs + trailCvs + вспышки
// ══════════════════════════════════════════════
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const bgCvs    = document.createElement('canvas');
const bgCtx    = bgCvs.getContext('2d');
const trailCvs = document.createElement('canvas');
const trailCtx = trailCvs.getContext('2d');
const labelsEl = document.getElementById('labels');
const ctaEl    = document.getElementById('cta');
let W, H;

// ── Цветки ────────────────────────────────────
const FLOWERS = [
  { name:'sakura',    ru:'🌸 Сакура',    shape:'round',    n:32, sz:[4,9],  spd:[3,10],
    colors:['#ffb7c5','#ff85a1','#ffd1dc','#ff6b8a','#ffadc5','#ffcdd2'] },
  { name:'sunflower', ru:'🌻 Подсолнух', shape:'elongated',n:28, sz:[5,12], spd:[3,10],
    colors:['#ffd700','#ffb300','#ffcc02','#fff176','#ff8f00','#ffe082'] },
  { name:'lavender',  ru:'💜 Лаванда',   shape:'thin',     n:55, sz:[3,7],  spd:[2,8],
    colors:['#c77dff','#a78bfa','#9b59b6','#e0aaff','#d4a5ff','#ce93d8'] },
  { name:'rose',      ru:'🌹 Роза',      shape:'heart',    n:26, sz:[5,11], spd:[3,9],
    colors:['#ff1744','#f50057','#e91e63','#ff4081','#c62828','#ff80ab'] },
  { name:'daisy',     ru:'🌼 Ромашка',   shape:'thin',     n:44, sz:[3,9],  spd:[2,8],
    colors:['#ffffff','#e3f2fd','#fff9c4','#f5f5f5','#fffde7','#e8eaf6'] },
  { name:'peony',     ru:'🌺 Пион',      shape:'round',    n:48, sz:[3,11], spd:[2,10],
    colors:['#f48fb1','#f06292','#ec407a','#f8bbd9','#fce4ec','#ff80ab'] },
  { name:'iris',      ru:'💐 Ирис',      shape:'pointed',  n:33, sz:[5,11], spd:[3,10],
    colors:['#7c4dff','#651fff','#3d5afe','#b388ff','#536dfe','#82b1ff'], grouped:true },
  { name:'mimosa',    ru:'✨ Мимоза',    shape:'dot',      n:68, sz:[2,5],  spd:[2,7],
    colors:['#ffee58','#ffca28','#fff176','#f9a825','#ffeb3b','#fffde7'], glow:true },
  { name:'tulip',     ru:'🌷 Тюльпан',   shape:'cup',      n:20, sz:[7,14], spd:[3,9],
    colors:['#e53935','#ff5722','#ff7043','#ff8a65','#ef6c00','#d84315'] },
  { name:'forget',    ru:'💙 Незабудка', shape:'round',    n:52, sz:[2,6],  spd:[2,8],
    colors:['#42a5f5','#64b5f6','#90caf9','#1e88e5','#bbdefb','#e3f2fd'] },
];

// ── Рисование формы ───────────────────────────
function drawShape(c, shape, sz) {
  c.beginPath();
  switch (shape) {
    case 'round':     c.arc(0,0,sz,0,Math.PI*2); break;
    case 'elongated': c.ellipse(0,0,sz*0.28,sz,0,0,Math.PI*2); break;
    case 'thin':      c.ellipse(0,0,sz*0.16,sz,0,0,Math.PI*2); break;
    case 'dot':       c.arc(0,0,sz*0.55,0,Math.PI*2); break;
    case 'pointed':
      c.moveTo(0,-sz); c.lineTo(sz*0.4,0);
      c.lineTo(0,sz*0.65); c.lineTo(-sz*0.4,0); c.closePath(); break;
    case 'heart': {
      const h = sz*0.75;
      c.moveTo(0,h*0.65);
      c.bezierCurveTo(-h*1.1,h*0.1, -h*1.1,-h, 0,-h*0.4);
      c.bezierCurveTo( h*1.1,-h,     h*1.1, h*0.1, 0,h*0.65); break;
    }
    case 'cup': {
      c.moveTo(-sz*0.65,sz*0.5);
      c.bezierCurveTo(-sz,-sz*0.15, -sz*0.4,-sz, 0,-sz);
      c.bezierCurveTo(sz*0.4,-sz, sz,-sz*0.15, sz*0.65,sz*0.5);
      c.closePath(); break;
    }
  }
  c.fill();
}

function renderOn(c, shape, x, y, rot, sz, color, glow) {
  c.save();
  c.translate(x, y); c.rotate(rot);
  c.globalAlpha = 0.9; c.fillStyle = color;
  if (glow) { c.shadowColor = color; c.shadowBlur = 8; }
  drawShape(c, shape, sz);
  c.restore();
}

// ── Лепесток ──────────────────────────────────
class Petal {
  constructor(x, y, f, i) {
    this.shape = f.shape;
    this.color = f.colors[Math.floor(Math.random() * f.colors.length)];
    this.glow  = f.glow || false;

    let angle;
    if (f.grouped) {
      const groups = Math.ceil(f.n / 3);
      const g = Math.floor(i / 3), p = (i % 3) - 1;
      angle = (g / groups) * Math.PI*2 + p*0.27;
    } else {
      angle = Math.random() * Math.PI * 2;
    }
    const spd = f.spd[0] + Math.random() * (f.spd[1] - f.spd[0]);
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd - Math.random() * 2;
    this.g   = 0.11 + Math.random() * 0.09;
    this.fl  = (Math.random() - 0.5) * 0.11;
    this.fp  = Math.random() * Math.PI * 2;
    this.sz  = f.sz[0] + Math.random() * (f.sz[1] - f.sz[0]);
    this.rot = Math.random() * Math.PI * 2;
    this.rs  = (Math.random() - 0.5) * 0.12;
    this.life = 110 + Math.random() * 70;
    this._dead = false;
  }

  update() {
    this.fp += 0.05;
    this.vx += Math.sin(this.fp) * this.fl;
    this.x += this.vx; this.vy += this.g; this.y += this.vy;
    this.vx *= 0.98; this.rot += this.rs; this.life--;
    if (this.life <= 0) {
      this._dead = true; // просто умирает, след остаётся на trailCvs и угасает
    }
  }

  // Рисует текущий кадр на слой следов
  draw() { renderOn(trailCtx, this.shape, this.x, this.y, this.rot, this.sz, this.color, this.glow); }

  // Рисует на постоянный слой
  toBg() { renderOn(bgCtx, this.shape, this.x, this.y, this.rot, this.sz, this.color, this.glow); }

  dead() { return this._dead; }
}

// ── Вспышка ───────────────────────────────────
class Flash {
  constructor(x, y, color) { this.x=x; this.y=y; this.color=color; this.r=3; this.a=1; }
  update() { this.r += 5; this.a -= 0.1; }
  draw() {
    if (this.a <= 0) return;
    const g = ctx.createRadialGradient(this.x,this.y,0, this.x,this.y,this.r);
    g.addColorStop(0, `rgba(255,255,255,${(this.a*0.85).toFixed(2)})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.save(); ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  dead() { return this.a <= 0; }
}

// ── Подпись ───────────────────────────────────
function showLabel(x, y, text) {
  const el = document.createElement('div');
  el.textContent = text;
  Object.assign(el.style, {
    position:'absolute', left:x+'px', top:(y-20)+'px',
    transform:'translateX(-50%)', fontFamily:'Georgia,serif',
    fontSize:'1.05em', color:'rgba(255,255,255,0.92)',
    textShadow:'0 0 10px rgba(200,160,255,0.95)',
    whiteSpace:'nowrap', pointerEvents:'none',
    animation:'floatUp 2s ease forwards',
  });
  labelsEl.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// ── Заморозка ─────────────────────────────────
let petals = [], flashes = [];
let lastTapTime = 0;

function freeze() {
  // Рисуем текущие позиции на слой следов (последний кадр)
  for (const p of petals) p.draw();
  // Копируем всю картинку следов в постоянный слой — без потерь
  bgCtx.drawImage(trailCvs, 0, 0);
  // Чистим
  petals = []; flashes = [];
  trailCtx.clearRect(0, 0, W, H);
}

// ── Главный цикл ──────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  // 1 секунда без нажатий → заморозка
  if (petals.length > 0 && Date.now() - lastTapTime > 1000) freeze();

  // Обновляем (осевшие рисуются в bgCtx внутри update)
  for (const p of petals) p.update();
  for (const f of flashes) f.update();

  // Угасаем следы через destination-out (убирает alpha, не добавляет цвет)
  trailCtx.save();
  trailCtx.globalCompositeOperation = 'destination-out';
  trailCtx.globalAlpha = 0.015;
  trailCtx.fillStyle = '#000';
  trailCtx.fillRect(0, 0, W, H);
  trailCtx.restore();

  // Рисуем текущие лепестки на слой следов
  for (const p of petals) { if (!p.dead()) p.draw(); }

  // Собираем итоговый кадр
  ctx.fillStyle = '#09071a';
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(bgCvs, 0, 0);     // постоянный слой
  ctx.drawImage(trailCvs, 0, 0);  // следы поверх

  // Вспышки
  for (const f of flashes) { if (!f.dead()) f.draw(); }

  // Убираем завершённые
  petals  = petals.filter(p => !p.dead());
  flashes = flashes.filter(f => !f.dead());
}

// ── Взрыв ─────────────────────────────────────
let flowerIdx = 0, firstClick = false;

function burst(x, y, auto = false) {
  lastTapTime = Date.now();
  if (!auto && !firstClick) {
    firstClick = true;
    ctaEl.style.animation = 'none';
    ctaEl.style.opacity = '0';
  }
  const f = FLOWERS[flowerIdx % FLOWERS.length];
  flowerIdx++;
  flashes.push(new Flash(x, y, f.colors[0]));
  showLabel(x, y, f.ru);
  for (let i = 0; i < f.n; i++) petals.push(new Petal(x, y, f, i));
}

// ── События ───────────────────────────────────
document.addEventListener('pointerdown', e => {
  if (e.target.id === 'clearBtn') return;
  e.preventDefault();
  burst(e.clientX, e.clientY);
});

document.getElementById('clearBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  petals = []; flashes = [];
  bgCtx.clearRect(0, 0, W, H);
  trailCtx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#09071a';
  ctx.fillRect(0, 0, W, H);
});

// ── Инит ──────────────────────────────────────
function resize() {
  W = canvas.width = bgCvs.width = trailCvs.width  = window.innerWidth;
  H = canvas.height = bgCvs.height = trailCvs.height = window.innerHeight;
  ctx.fillStyle = '#09071a';
  ctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();
loop();

// ── Показать "Нажимай!" через 3с ──────────────
setTimeout(() => {
  ctaEl.style.opacity = '1';
  ctaEl.style.animation = 'ctaGlow 2s ease-in-out infinite';
}, 3000);

// ── Приветственный залп ───────────────────────
setTimeout(() => {
  [
    [W*0.50, H*0.44],
    [W*0.22, H*0.40], [W*0.78, H*0.40],
    [W*0.10, H*0.68], [W*0.90, H*0.68],
    [W*0.50, H*0.18],
  ].forEach(([x,y], i) => setTimeout(() => burst(x, y, true), i*330));
}, 1100);
</script>
</body>
</html>
