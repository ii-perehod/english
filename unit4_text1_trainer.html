<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit IV · Text 1 · Forests of the Earth</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh; color:#fff;
  display:flex; flex-direction:column; align-items:center; padding-bottom:30px;
}
h1 { margin:5px 0 2px; font-size:1.2em; text-shadow:0 0 20px rgba(167,139,250,0.5); }
.subtitle { color:#a78bfa; margin-bottom:8px; font-size:0.85em; }

.screen {
  background:rgba(255,255,255,0.08); backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.15); border-radius:20px;
  padding:15px 20px; width:640px; max-width:92vw;
  text-align:center; animation:fadeIn .35s ease; margin-top:5px;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

/* BUTTONS */
.big-btn {
  padding:12px 28px; border:none;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  color:#0f0c29; border-radius:25px; font-size:1em; font-weight:700;
  cursor:pointer; transition:transform .2s; margin:4px;
}
.big-btn:hover { transform:scale(1.04); }
.big-btn-outline {
  background:transparent; border:2px solid #a78bfa; color:#a78bfa;
  padding:10px 20px; border-radius:25px; font-size:.95em; font-weight:600;
  cursor:pointer; transition:all .2s; margin:4px;
}
.big-btn-outline:hover { background:rgba(167,139,250,0.15); }
.btn-row { display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap; }

/* SETUP GRID */
.section-label {
  font-size:.78em; color:#64748b; text-transform:uppercase; letter-spacing:1px;
  margin:14px 0 8px; border-top:1px solid rgba(255,255,255,0.07); padding-top:14px;
}
.section-label:first-of-type { border-top:none; padding-top:0; margin-top:4px; }
.mode-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.mode-card {
  padding:12px 8px; border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05); border-radius:12px;
  cursor:pointer; transition:all .25s; font-size:.82em; line-height:1.3;
}
.mode-card:hover { border-color:#a78bfa; background:rgba(167,139,250,0.15); transform:translateY(-2px); }
.mc-icon { font-size:1.6em; display:block; margin-bottom:4px; }
.mc-name { font-weight:600; color:#e2e8f0; }
.mc-desc { font-size:.78em; color:#64748b; margin-top:2px; }

/* PROGRESS */
.progress-wrap { width:100%; height:5px; background:rgba(255,255,255,.1); border-radius:3px; margin:8px 0 12px; overflow:hidden; }
.progress-bar  { height:100%; background:linear-gradient(90deg,#a78bfa,#60a5fa); border-radius:3px; transition:width .4s; }

/* READ */
.text-area { text-align:left; line-height:2.0; font-size:.93em; margin:10px 0; padding:4px; }
.sent-span { cursor:pointer; border-radius:4px; padding:1px 2px; transition:background .2s; }
.sent-span:hover { background:rgba(167,139,250,0.2); }
.sent-highlight { background:rgba(167,139,250,0.3) !important; }

/* BLANKS */
.text-blanks { text-align:left; line-height:2.6; font-size:.9em; margin:10px 0; padding:4px; }
.blank-wrap { display:inline-block; position:relative; }
.blank-input {
  border:none; border-bottom:2px dashed #a78bfa; background:transparent;
  color:#e2e8f0; font-family:inherit; font-size:.92em; outline:none;
  text-align:center; padding:0 2px; margin:0 2px; vertical-align:baseline;
}
.blank-input.correct { border-bottom-color:#4ade80; color:#4ade80; pointer-events:none; }
.blank-input.wrong   { border-bottom-color:#f87171; color:#f87171; }
.blank-hint { position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:.7em; color:#4ade80; white-space:nowrap; pointer-events:none; }

/* FIRST LETTERS */
.text-first { text-align:left; line-height:2.1; font-size:.9em; margin:10px 0; padding:4px; }
.fl-hidden { color:transparent; background:rgba(255,255,255,.12); border-radius:2px; cursor:pointer; }
.fl-hidden:hover { background:rgba(167,139,250,.25); }
.fl-hidden.shown  { color:#4ade80; background:transparent; cursor:default; }

/* MEMORY */
.mem-textarea {
  width:100%; min-height:190px; background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.15); border-radius:12px;
  color:#e2e8f0; font-family:inherit; font-size:.9em; line-height:1.7;
  padding:12px; outline:none; resize:vertical; margin:10px 0;
}
.mem-textarea:focus { border-color:#a78bfa; }
.mem-result { text-align:left; line-height:2.0; font-size:.9em; margin:10px 0; padding:8px 12px; background:rgba(0,0,0,.2); border-radius:12px; }
.mem-ok  { color:#4ade80; }
.mem-bad { color:#f87171; text-decoration:underline; cursor:help; }

/* PRONUNCIATION */
.pron-sent { font-size:1.15em; font-weight:600; color:#60a5fa; text-align:center; margin:12px 0 8px; line-height:1.5; }
.mic-btn {
  width:68px; height:68px; border-radius:50%; border:3px solid #a78bfa;
  background:rgba(167,139,250,.1); color:#a78bfa; font-size:1.7em;
  cursor:pointer; transition:all .3s; display:flex; align-items:center; justify-content:center; margin:4px;
}
.mic-btn:hover { background:rgba(167,139,250,.2); transform:scale(1.05); }
.mic-btn.recording { border-color:#f87171; background:rgba(248,113,113,.2); color:#f87171; animation:micPulse 1s infinite; }
@keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 12px rgba(248,113,113,0)} }
.heard-text { font-size:.95em; color:#94a3b8; margin:8px 0; min-height:1.4em; }
.pr-result  { font-size:1.1em; font-weight:600; margin:8px 0; }
.pr-result.pr-ok   { color:#4ade80; }
.pr-result.pr-fail { color:#f87171; }

/* EXERCISES */
.exhead { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.ex-num { background:linear-gradient(135deg,#a78bfa,#60a5fa); color:#0f0c29; font-size:.75em; font-weight:700; padding:3px 10px; border-radius:12px; white-space:nowrap; }
.ex-title { font-size:.88em; color:#94a3b8; }
.q-prog   { font-size:.76em; color:#64748b; margin-left:auto; white-space:nowrap; }
.qcard { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:16px; margin-bottom:12px; text-align:left; }
.qtext { font-size:.9em; color:#e2e8f0; line-height:1.6; margin-bottom:10px; }
.qword { font-size:1.4em; font-weight:700; color:#60a5fa; text-align:center; margin-bottom:12px; }
.opts  { display:flex; flex-direction:column; gap:7px; }
.opt   { background:rgba(255,255,255,.04); border:2px solid rgba(255,255,255,.12); border-radius:12px; padding:11px 14px; cursor:pointer; font-size:.88em; transition:all .2s; color:#e2e8f0; }
.opt:hover { border-color:#a78bfa; background:rgba(167,139,250,.1); }
.opt.ok  { border-color:#4ade80; background:rgba(74,222,128,.12); color:#4ade80; pointer-events:none; }
.opt.bad { border-color:#f87171; background:rgba(248,113,113,.12); color:#f87171; pointer-events:none; }
.cats { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:6px; }
.cat-btn { padding:10px 18px; border-radius:12px; border:2px solid; cursor:pointer; font-size:.88em; font-weight:600; transition:all .2s; }
.cat-simple { border-color:rgba(74,222,128,.4); color:#4ade80; background:rgba(74,222,128,.07); }
.cat-simple:hover { background:rgba(74,222,128,.18); }
.cat-deriv  { border-color:rgba(96,165,250,.4); color:#60a5fa; background:rgba(96,165,250,.07); }
.cat-deriv:hover  { background:rgba(96,165,250,.18); }
.cat-comp   { border-color:rgba(167,139,250,.4); color:#a78bfa; background:rgba(167,139,250,.07); }
.cat-comp:hover   { background:rgba(167,139,250,.18); }
.cat-result { font-size:.84em; padding:8px 12px; border-radius:10px; text-align:center; margin-top:10px; }
.cat-result.ok  { background:rgba(74,222,128,.1); color:#4ade80; }
.cat-result.bad { background:rgba(248,113,113,.1); color:#f87171; }
.fill-sent  { font-size:.9em; color:#e2e8f0; line-height:1.8; margin-bottom:10px; }
.fill-blank { color:#a78bfa; font-weight:600; }
.hint-box   { background:rgba(167,139,250,.06); border:1px solid rgba(167,139,250,.2); border-radius:10px; padding:10px 14px; margin-bottom:10px; }
.hint-q { font-size:.84em; color:#a78bfa; margin-bottom:3px; }
.hint-l { font-size:.78em; color:#64748b; font-style:italic; }
.inp-row { display:flex; gap:8px; }
.inp { flex:1; background:rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.15); border-radius:10px; padding:10px 14px; color:#e2e8f0; font-size:.9em; font-family:inherit; outline:none; }
.inp:focus  { border-color:#a78bfa; }
.inp.ok  { border-color:#4ade80; color:#4ade80; }
.inp.bad { border-color:#f87171; color:#f87171; }
.chk { background:rgba(167,139,250,.12); border:2px solid rgba(167,139,250,.4); color:#a78bfa; padding:10px 14px; border-radius:10px; cursor:pointer; font-size:.88em; white-space:nowrap; }
.chk:hover { background:rgba(167,139,250,.22); }
.speak-btn { background:none; border:1px solid rgba(167,139,250,.3); color:rgba(167,139,250,.7); padding:3px 10px; border-radius:6px; cursor:pointer; font-size:.76em; margin:4px 0 8px; }
.speak-btn:hover { color:#a78bfa; border-color:#a78bfa; }

/* RESULTS */
.result-big { font-size:3em; font-weight:800; background:linear-gradient(135deg,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:10px 0; }
.result-grade { font-size:1.2em; margin-bottom:12px; }
.round-badge { display:inline-block; padding:4px 12px; background:rgba(167,139,250,.2); border-radius:20px; font-size:.85em; color:#a78bfa; margin-bottom:10px; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

@media(max-width:500px) { .mode-grid{grid-template-columns:repeat(2,1fr)} }

/* ANALYSIS */
.analysis-q { font-size:.86em; color:#a78bfa; margin:12px 0 6px; font-weight:600; }
.analysis-hint { background:rgba(96,165,250,.08); border:1px solid rgba(96,165,250,.25); border-radius:10px; padding:10px 14px; font-size:.82em; color:#bfdbfe; line-height:1.55; margin:10px 0 6px; }
.opt-sm { font-size:.82em !important; padding:8px 12px !important; }
.hidden { display:none; }
</style>
</head>
<body>
<h1>English Quiz</h1>
<p class="subtitle">Unit IV · Text 1 · Forests of the Earth</p>
<div id="app"></div>
<script>
// ── TEXT DATA ─────────────────────────────────────────────────────────────────
const SENTENCES = [
  "Long time ago almost 2/3 of the land was covered with forests, but today more than a half of them has been destroyed.",
  "When an ax rings in some remote tropical forests or taiga, it strikes all too close to home.",
  "When the habitat of half the world's plant and animal species is destroyed at a rate of 50 acres every minute, we all pay the price.",
  "Forests have yielded precious medicines, food crop varieties and much more.",
  "They are habitat for many rare birds and other wildlife.",
  "And the lives of hundreds of millions of people depend on the forests for survival.",
  "Large tracts of forest are of great importance for the global oxygen and carbon circulation.",
  "Their quantity influences greatly the radiation balance, the atmosphere circulation and moisture of the air, the water regime of the land.",
  "According to the existing estimations, during the Neolithic revolution, the forest covered 62 billion hectares of the land.",
  "Within 10 thousand years of forest annihilation their total area shortened to 40 billion hectares and the average woodland to 30%.",
  "However, virgin forests occupy at present only 15 billion hectares — mainly in Russia, Canada, Amazonia.",
  "In the majority of regions all or almost all virgin forests were replaced by the secondary ones, including planted forests.",
  "In our days the forest annihilation goes very fast: annually more than 20 million hectares are annihilated.",
  "Especially dangerous situation is in the zone of the tropical forests.",
  "According to FAO, in the early 90s approximately 17 million hectares of forests were annihilated annually.",
  "If the situation does not change, in half a century their final destruction will occur.",
  "Moreover, the tropical forests are cut down with the speed which exceeds the speed of their natural restoration 15 times.",
  "These forests have more than a half of all flora and fauna species represented on the Earth."
];
const FULL_TEXT = SENTENCES.join(' ');
const SENT_COLORS = ['#e2e8f0','#a78bfa','#60a5fa','#4ade80','#fbbf24','#f87171','#fb923c','#22d3ee'];

// ── EXERCISE DATA ─────────────────────────────────────────────────────────────
const EX1 = [
  { q:"How do people's lives depend on the forests for survival?",
    a:'The lives of hundreds of millions of people depend on the forests for survival',
    opts:['The lives of hundreds of millions of people depend on the forests for survival','People use forests mainly for tourism and wood production','Scientists depend on forests for their research experiments','Modern cities get most of their oxygen from planted urban trees'],
    analysis:{
      qtype:'Как именно (механизм / в чём именно)',
      qtypeOpts:['Как именно (механизм / в чём именно)','Где (место)','Почему (причина)','Когда (время)'],
      kw:'depend on',
      kwOpts:["depend on","people's lives","forests","survival"],
      tip:'Найди в тексте: "...depend on the forests for survival" — что стоит перед этой фразой? Это и будет ответ.'
    }},
  { q:'What happened to the forests within 10 thousand years of their annihilation?',
    a:'Their total area shortened to 40 billion hectares and the average woodland to 30%',
    opts:['Their total area shortened to 40 billion hectares and the average woodland to 30%','Forests doubled in size because of natural restoration','All virgin forests were completely and permanently destroyed','New types of forest appeared in place of the old ones'],
    analysis:{
      qtype:'Что произошло (факт / изменение)',
      qtypeOpts:['Что произошло (факт / изменение)','Где (место)','Почему (причина)','Как (механизм)'],
      kw:'10 thousand years',
      kwOpts:['10 thousand years','happened','annihilation','within'],
      tip:'Ищи в тексте конкретные цифры: "40 billion hectares" и "30%" — они описывают то, что произошло.'
    }},
  { q:'Where can virgin forests be found today?',
    a:'Mainly in Russia, Canada, and Amazonia',
    opts:['Mainly in Russia, Canada, and Amazonia','In Western Europe and the British Isles','Only in tropical regions near the equator','In Africa, Australia, and Southern India'],
    analysis:{
      qtype:'Где (место / расположение)',
      qtypeOpts:['Где (место / расположение)','Когда (время)','Почему (причина)','Как (механизм)'],
      kw:'virgin forests',
      kwOpts:['virgin forests','be found','today','can'],
      tip:'Virgin forests = нетронутые леса. Ищи в тексте перечисление стран после "mainly in..."'
    }},
  { q:'Why is the situation in the zone of tropical forests especially dangerous?',
    a:'Annually 17 million hectares are annihilated; forests are cut 15× faster than they restore; final destruction may occur in half a century',
    opts:['Annually 17 million hectares are annihilated; forests are cut 15× faster than they restore; final destruction may occur in half a century','Tropical forests produce too much oxygen and cause climate imbalance','Acid rain destroys tropical forests much faster than northern ones','Tropical forests attract too many tourists, causing environmental damage'],
    analysis:{
      qtype:'Почему (причина / объяснение)',
      qtypeOpts:['Почему (причина / объяснение)','Что (факт)','Где (место)','Когда (время)'],
      kw:'especially dangerous',
      kwOpts:['especially dangerous','tropical forests','situation','zone'],
      tip:'Ищи в тексте факты-доказательства: "17 million hectares", "15 times faster", "half a century" — это и есть причины опасности.'
    }},
  { q:'Why do we call the tropical forests "the lungs of the planet"?',
    a:"Because they contain more than half of all flora and fauna species and are vital for the Earth's oxygen and carbon balance",
    opts:["Because they contain more than half of all flora and fauna species and are vital for the Earth's oxygen and carbon balance",'Because animals in tropical forests breathe air that is cleaner than elsewhere','Because most medical researchers live and work in tropical regions','Because tropical forests produce acid rain that cleanses the atmosphere'],
    analysis:{
      qtype:'Почему (причина / объяснение)',
      qtypeOpts:['Почему (причина / объяснение)','Что (факт)','Где (место)','Как (механизм)'],
      kw:'lungs of the planet',
      kwOpts:['lungs of the planet','tropical forests','flora and fauna','we call'],
      tip:'"Lungs" — метафора: лёгкие планеты. Ищи что делают тропические леса для кислорода, углерода и биоразнообразия.'
    }}
];

const EX2 = [
  {en:'habitat',                              ru:'среда обитания',                               opts:['среда обитания','природная зона','экосистема','биосфера'],                                    tip:'habi- (лат. habere = занимать, иметь) → место, где организмы «живут». Буквально: их «дом».'},
  {en:'food crop varieties',                  ru:'сорта продовольственных культур',              opts:['сорта продовольственных культур','сельскохозяйственные угодья','виды пищевых ресурсов','продукты питания'],  tip:'food = продовольственный; crop = культурное растение (то, что выращивают); variety = разновидность. Три слова — три компонента.'},
  {en:'global oxygen and carbon circulation', ru:'глобальный круговорот кислорода и углерода',  opts:['глобальный круговорот кислорода и углерода','мировое загрязнение воздуха','обмен газами в атмосфере','выброс парниковых газов'], tip:'circulation (лат. circulare = двигаться по кругу) = круговорот. Global = планетарный. Два газа: oxygen (O₂) + carbon (CO₂).'},
  {en:'radiation balance',                    ru:'радиационный баланс',                          opts:['радиационный баланс','тепловое загрязнение','солнечная активность','климатический режим'],    tip:'radiation = излучение (солнечная энергия); balance = равновесие (как весы). Сколько пришло — столько и ушло.'},
  {en:'water regime',                         ru:'водный режим',                                  opts:['водный режим','режим осадков','уровень грунтовых вод','водные ресурсы'],                      tip:'regime (фр. régime) = режим, порядок. Water regime = как именно распределяется и движется вода на суше.'},
  {en:'cattle-breeding',                      ru:'скотоводство',                                  opts:['скотоводство','земледелие','лесоводство','рыболовство'],                                      tip:'cattle = крупный рогатый скот; breeding (от breed = порода) = разведение. Cattle-breeding = разведение скота.'},
  {en:'forest annihilation',                  ru:'уничтожение лесов',                             opts:['уничтожение лесов','лесные пожары','деградация лесов','лесонасаждение'],                      tip:'annihilate (лат. nihil = ничто) → «превратить в ничто» = полное уничтожение, не просто вырубка.'},
  {en:'woodland',                             ru:'лесная площадь, лесной массив',                opts:['лесная площадь, лесной массив','заповедная зона','лесопосадка','пригородный парк'],           tip:'wood = лес/древесина + land = земля → земля, покрытая лесом. Woodland = лесные угодья.'},
  {en:'virgin forests',                       ru:'девственные (нетронутые) леса',                opts:['девственные (нетронутые) леса','вторичные леса','посаженные леса','тропические джунгли'],    tip:'virgin = нетронутый, первозданный (ср. Virgin Islands). Леса, которых никогда не касался топор.'},
  {en:'natural restoration',                  ru:'естественное восстановление',                  opts:['естественное восстановление','искусственное лесонасаждение','природная среда','экологическая реабилитация'], tip:'restore (лат. restaurare = восстанавливать) + -tion. Natural = без помощи человека, сам по себе.'},
  {en:'flora and fauna species',              ru:'виды флоры и фауны',                            opts:['виды флоры и фауны','природные экосистемы','биологическое разнообразие','животный и растительный мир'], tip:'Flora — рим. богиня растений; Fauna — рим. богиня животных. Species = вид (биологическая единица классификации).'}
];

const EX3 = [
  {word:'plant',          cat:'simple', explain:'Корневое слово без аффиксов'},
  {word:'variety',        cat:'deriv',  explain:'vary + -iety → производное'},
  {word:'wildlife',       cat:'comp',   explain:'wild + life → сложное'},
  {word:'circulation',    cat:'deriv',  explain:'circulate + -ion → производное'},
  {word:'cattle-breeding',cat:'comp',   explain:'cattle + breeding → сложное'},
  {word:'to replace',     cat:'deriv',  explain:'re- + place → производное'},
  {word:'secondary',      cat:'deriv',  explain:'second + -ary → производное'},
  {word:'including',      cat:'deriv',  explain:'in- + clude + -ing → производное'},
  {word:'dangerous',      cat:'deriv',  explain:'danger + -ous → производное'},
  {word:'result',         cat:'simple', explain:'Корневое слово'},
  {word:'to decrease',    cat:'deriv',  explain:'de- + crease → производное'},
  {word:'change',         cat:'simple', explain:'Корневое слово'},
  {word:'destruction',    cat:'deriv',  explain:'destruct + -ion → производное'},
  {word:'to represent',   cat:'deriv',  explain:'re- + present → производное'},
  {word:'restoration',    cat:'deriv',  explain:'restore + -ation → производное'},
  {word:'greenhouse',     cat:'comp',   explain:'green + house → сложное'}
];

  {before:'Forests have yielded precious medicines,', blank:'food crop varieties', after:'and much more.', hint1:'Что ещё леса давали людям помимо лекарств? (3 слова)', hint2:'food cr...', audio:'Forests have yielded precious medicines, food crop varieties and much more.'},

function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }
function speak(t){ if(!window.speechSynthesis) return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='en-GB'; u.rate=0.88; speechSynthesis.speak(u); }

function startRead(){
  const html = SENTENCES.map((s,i)=>
    `<span class="sent-span" style="color:${SENT_COLORS[i%SENT_COLORS.length]}" data-i="${i}" onclick="speakSent(${i})">${escH(s)} </span>`
  ).join('');
  app.innerHTML=`

      <button class="big-btn-outline" onclick="showSetup()">← Назад</button>
    </div>
  </div>`;

function speakSent(i){
  stopAll();
  document.querySelectorAll('.sent-span').forEach(s=>s.classList.remove('sent-highlight'));
  const sp=document.querySelector(`.sent-span[data-i="${i}"]`);
  if(sp) sp.classList.add('sent-highlight');
  speak(SENTENCES[i]);
}
function listenAll(){ stopAll(); listenIdx=0; playNext(); }
function playNext(){
  if(listenIdx>=SENTENCES.length){ document.querySelectorAll('.sent-span').forEach(s=>s.classList.remove('sent-highlight')); return; }
  document.querySelectorAll('.sent-span').forEach(s=>s.classList.remove('sent-highlight'));
  const sp=document.querySelector(`.sent-span[data-i="${listenIdx}"]`);
  if(sp){ sp.classList.add('sent-highlight'); sp.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  const u=new SpeechSynthesisUtterance(SENTENCES[listenIdx]);
  u.lang='en-GB'; u.rate=0.85;
  u.onend=()=>{ listenIdx++; setTimeout(playNext,350); };
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}
function stopAll(){ speechSynthesis.cancel(); listenIdx=SENTENCES.length; document.querySelectorAll('.sent-span').forEach(s=>s.classList.remove('sent-highlight')); }

// ── BLANKS MODE ───────────────────────────────────────────────────────────────
function startBlanks(pct){ blanksPct=pct; renderBlanks(pct); }

function renderBlanks(pct){
  const tokens = FULL_TEXT.match(/\S+|\s+/g) || [];
  const blankable = [];
  tokens.forEach((t,i)=>{ if(!/\s/.test(t) && t.replace(/[^a-zA-Z]/g,'').length>=4) blankable.push(i); });

  const step = Math.round(100/pct);
  const toBlank = new Set(blankable.filter((_,j)=>(j+1)%step===0));

  let count=0;
  const html = tokens.map((t,i)=>{
    if(/\s/.test(t)) return t;
    if(toBlank.has(i)){
      count++;
      const letters = t.replace(/[.,!?;:'"\-()—]/g,'');
      const trail   = t.slice(letters.length);
      const w = Math.max(50, letters.length*9+10);
      return `<span class="blank-wrap"><input class="blank-input" style="width:${w}px" data-ans="${escH(letters.toLowerCase())}" autocomplete="off" autocorrect="off" spellcheck="false">${escH(trail)}</span>`;
    }
    return escH(t);
  }).join('');

  app.innerHTML=`
  <div class="screen" style="animation:none">
    <div class="exhead"><span class="ex-num">Пропуски ${pct}%</span><span class="ex-title">${count} пропусков — заполни и нажми Проверить</span></div>
    <div class="text-blanks" id="tBlanks">${html}</div>
    <div class="btn-row">
      <button class="big-btn" onclick="checkBlanks()">Проверить</button>
      <button class="big-btn-outline" onclick="startBlanks(${pct})">Сначала</button>
      <button class="big-btn-outline" onclick="showSetup()">← Назад</button>
    </div>
    <div id="blanksRes" style="margin-top:10px;text-align:center"></div>
  </div>`;

  const inputs = [...document.querySelectorAll('.blank-input')];
  inputs.forEach((inp,i)=>inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault(); if(i<inputs.length-1) inputs[i+1].focus(); else checkBlanks(); } }));
  if(inputs.length) inputs[0].focus();
}

function checkBlanks(){
  const inputs = [...document.querySelectorAll('.blank-input:not(.correct)')];
  let wrong=0;
  inputs.forEach(inp=>{
    const val = inp.value.trim().toLowerCase().replace(/[^a-z0-9'-]/g,'');
    if(val===inp.dataset.ans){
      inp.classList.add('correct'); inp.disabled=true;
    } else {
      wrong++;
      inp.classList.add('wrong');
      if(!inp.parentElement.querySelector('.blank-hint')){
        const h=document.createElement('div'); h.className='blank-hint'; h.textContent=inp.dataset.ans;
        inp.parentElement.appendChild(h);
      }
      setTimeout(()=>inp.classList.remove('wrong'),800);
    }
  });
  const all=[...document.querySelectorAll('.blank-input')];
  const done=all.filter(i=>i.classList.contains('correct')).length;
  const pct=Math.round(done/all.length*100);
  const res=document.getElementById('blanksRes');
  if(wrong===0){
    res.innerHTML=`<div class="result-big">${pct}%</div><div class="result-grade">🏆 Все пропуски верно!</div>`;
  } else {
    res.innerHTML=`<div style="font-size:.9em;color:#94a3b8">${pct}% верно. Ошибок: ${wrong}. Исправь и проверь снова.</div>`;
  }
}

}

// ── FROM MEMORY ───────────────────────────────────────────────────────────────
function startMemory(){
  app.innerHTML=`
  <div class="screen">
    <div class="exhead"><span class="ex-num">По памяти</span><span class="ex-title">Напиши текст целиком</span></div>
    <textarea class="mem-textarea" id="memIn" placeholder="Long time ago almost 2/3 of the land..."></textarea>
    <div class="btn-row">
      <button class="big-btn" onclick="checkMemory()">Проверить</button>
      <button class="big-btn-outline" onclick="showSetup()">← Назад</button>
    </div>
  </div>`;
  document.getElementById('memIn').focus();
}
function checkMemory(){
  const input=document.getElementById('memIn').value;
  const uWords=input.trim().split(/\s+/);
  const tWords=FULL_TEXT.trim().split(/\s+/);
  let correct=0;
  const res=tWords.map((tw,i)=>{
    const tc=tw.toLowerCase().replace(/[^a-z0-9]/g,'');
    const uc=(uWords[i]||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    if(tc===uc){ correct++; return `<span class="mem-ok">${escH(tw)}</span>`; }
    return `<span class="mem-bad" title="Написано: ${escH(uWords[i]||'—')}">${escH(tw)}</span>`;
  });
  const pct=Math.round(correct/tWords.length*100);
  const grade=pct===100?'🏆 Идеально!':pct>=80?'😎 Отлично!':pct>=60?'👍 Неплохо':pct>=40?'📖 Нужно подучить':'💪 Попробуй ещё раз';
  app.innerHTML=`
  <div class="screen">
    <div class="result-big">${pct}%</div>
    <div class="result-grade">${grade}</div>
    <div style="font-size:.85em;color:#94a3b8;margin-bottom:10px">${correct} из ${tWords.length} слов верно</div>
    <div class="mem-result">${res.join(' ')}</div>
    <div class="btn-row">
      <button class="big-btn" onclick="startMemory()">Попробовать снова</button>
      <button class="big-btn-outline" onclick="showSetup()">← Назад</button>
    </div>
  </div>`;
}

function startPronunciation(){ pronIdx=0; buildPronScreen(); showPronSent(); }
function buildPronScreen(){
  app.innerHTML=`
  <div class="screen" style="animation:none">
    <div class="exhead"><span class="ex-num">Произношение</span><span class="ex-title" id="prCnt"></span></div>
    <div class="progress-wrap"><div class="progress-bar" id="prProg" style="width:0%"></div></div>
    <div class="pron-sent" id="prSent"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="mic-btn" onclick="speak(window._pCS)" title="Послушать">🔊</button>
      <button class="mic-btn" id="prMic" onclick="pronRecord()" title="Говорить">🎤</button>
    </div>
    <div class="heard-text" id="prHeard"></div>
    <div class="pr-result"  id="prRes"></div>
    <div class="btn-row" id="prBtns"><button class="big-btn-outline" onclick="showSetup()">← Назад</button></div>
  </div>`;
}
function showPronSent(){
  if(pronIdx>=SENTENCES.length){ showPronDone(); return; }
  const s=SENTENCES[pronIdx]; window._pCS=s;
  document.getElementById('prCnt').textContent=(pronIdx+1)+' / '+SENTENCES.length;
  document.getElementById('prProg').style.width=(pronIdx/SENTENCES.length*100)+'%';
  document.getElementById('prSent').textContent=s;
  document.getElementById('prHeard').textContent='';
  document.getElementById('prRes').textContent='';
  document.getElementById('prRes').className='pr-result';
  if(pronRec){ pronRec.stop(); pronRec=null; }
  document.getElementById('prMic').classList.remove('recording');
  document.getElementById('prBtns').innerHTML='<button class="big-btn-outline" onclick="showSetup()">← Назад</button>';
  speak(s);
}
function pronRecord(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ document.getElementById('prHeard').textContent='Используй Chrome для распознавания речи.'; return; }
  if(pronRec){ pronRec.stop(); return; }
  const mic=document.getElementById('prMic'); mic.classList.add('recording');
  document.getElementById('prHeard').textContent='Говори...';
  pronRec=new SR(); pronRec.lang='en-US'; pronRec.interimResults=true; pronRec.maxAlternatives=3;
  pronRec.onresult=function(e){
    let fin='',int='';
    for(let i=0;i<e.results.length;i++){ if(e.results[i].isFinal) fin+=e.results[i][0].transcript; else int+=e.results[i][0].transcript; }
    document.getElementById('prHeard').textContent=fin||int||'...';
    if(fin) checkPron(fin);
  };
  pronRec.onerror=function(e){ mic.classList.remove('recording'); pronRec=null; document.getElementById('prHeard').textContent=e.error==='no-speech'?'Не услышал, попробуй ещё раз.':'Ошибка: '+e.error; };
  pronRec.onend=function(){ mic.classList.remove('recording'); pronRec=null; };
  pronRec.start();
}
function checkPron(heard){
  const tgt=SENTENCES[pronIdx].toLowerCase().replace(/[^a-z0-9\s]/g,'');
  const h=heard.toLowerCase().replace(/[^a-z0-9\s]/g,'');
  const tw=tgt.split(/\s+/).filter(Boolean), hw=h.split(/\s+/).filter(Boolean);
  let hits=0; hw.forEach(w=>{ if(tw.includes(w)) hits++; });
  const pct=Math.round(hits/tw.length*100);
  const resEl=document.getElementById('prRes');
  document.getElementById('prHeard').innerHTML='Ты сказал: <b>'+escH(heard)+'</b> ('+pct+'%)';
  if(pct>=60){
    resEl.textContent=pct>=90?'Отлично! ✓':pct>=70?'Хорошо! ✓':'Неплохо!';
    resEl.className='pr-result pr-ok';
    document.getElementById('prBtns').innerHTML='<button class="big-btn" onclick="pronIdx++;showPronSent()">Далее →</button><button class="big-btn-outline" onclick="showSetup()">← Назад</button>';
  } else {
    resEl.textContent='Попробуй ещё раз';
    resEl.className='pr-result pr-fail';
    document.getElementById('prBtns').innerHTML='<button class="big-btn" onclick="pronRecord()">🎤 Ещё раз</button><button class="big-btn-outline" onclick="speak(window._pCS)">🔊 Послушать</button><button class="big-btn-outline" onclick="pronIdx++;showPronSent()">Пропустить →</button><button class="big-btn-outline" onclick="showSetup()">← Назад</button>';
  }
}
function showPronDone(){
  app.innerHTML='<div class="screen"><div style="font-size:2.5em;margin:15px 0">🎉</div><div style="font-size:1.3em;font-weight:600;margin-bottom:10px">Все '+SENTENCES.length+' предложений отработаны!</div><div class="btn-row"><button class="big-btn" onclick="startPronunciation()">Ещё раз</button><button class="big-btn-outline" onclick="showSetup()">← Назад</button></div></div>';
}

// ── EXERCISES ─────────────────────────────────────────────────────────────────
function startEx(n){ exAnswered=false; exHints=0;
  if(n===1){ex1Q=shuffle([...EX1]);ex1i=0;ex1s=0;ex1W=[];ex1R=1;renderEx1();}
  else if(n===2){ex2Q=shuffle([...EX2]);ex2i=0;ex2s=0;ex2W=[];ex2R=1;renderEx2();}
  else if(n===3){ex3Q=shuffle([...EX3]);ex3i=0;ex3s=0;ex3W=[];ex3R=1;renderEx3();}
  else{ex4Q=shuffle([...EX4]);ex4i=0;ex4s=0;ex4W=[];ex4R=1;renderEx4();}
}
function retryEx(n){exAnswered=false;exHints=0;
  if(n===1){ex1AnalysisDone=false;ex1Q=shuffle([...ex1W]);ex1i=0;ex1s=0;ex1W=[];ex1R++;renderEx1();}
  else if(n===2){ex2AnalysisDone=false;ex2Q=shuffle([...ex2W]);ex2i=0;ex2s=0;ex2W=[];ex2R++;renderEx2();}
  else if(n===3){ex3Q=shuffle([...ex3W]);ex3i=0;ex3s=0;ex3W=[];ex3R++;renderEx3();}
  else{ex4Q=shuffle([...ex4W]);ex4i=0;ex4s=0;ex4W=[];ex4R++;renderEx4();}
}

function renderEx1(){
  exAnswered=false;
  const d=ex1Q[ex1i];
  if(ex1R>1 && !ex1AnalysisDone && d.analysis){ showEx1Analysis(d); return; }
  ex1AnalysisDone=false;
  const opts=shuffle([...d.opts]);
  const rb=ex1R>1?`<div class="round-badge">Раунд ${ex1R} — повтор ошибок (${ex1Q.length})</div>`:'';
  app.innerHTML=`<div class="screen">${rb}<div class="exhead"><span class="ex-num">Задание 1</span><span class="ex-title">Вопросы по тексту</span><span class="q-prog">${ex1i+1}/${ex1Q.length}</span></div><div class="qcard"><div class="qtext">${escH(d.q)}</div><button class="speak-btn" onclick="speak(${JSON.stringify(d.q)})">🔊 Прослушать</button><div class="opts">${opts.map(o=>`<button class="opt" onclick="pickOpt1(this,'${encodeURIComponent(o)}','${encodeURIComponent(d.a)}')">${escH(o)}</button>`).join('')}</div></div><div class="btn-row"><button class="big-btn-outline" onclick="showSetup()">← Назад</button></div></div>`;
}
function pickOpt1(btn,se,ce){ if(exAnswered) return; exAnswered=true; const s=decodeURIComponent(se),c=decodeURIComponent(ce); document.querySelectorAll('.opt').forEach(b=>{b.style.pointerEvents='none'; if(b.textContent===c)b.classList.add('ok');}); if(s===c){btn.classList.add('ok');ex1s++;}else{btn.classList.add('bad');ex1W.push(ex1Q[ex1i]);} setTimeout(()=>{ex1i++;exAnswered=false;if(ex1i<ex1Q.length)renderEx1();else showExDone(1,ex1s,ex1Q.length,ex1W);},1400); }

function renderEx2(){
  exAnswered=false;
  const d=ex2Q[ex2i];
  if(ex2R>1 && !ex2AnalysisDone && d.tip){ showEx2Hint(d); return; }
  ex2AnalysisDone=false;
  const opts=shuffle([...d.opts]);
  const rb=ex2R>1?`<div class="round-badge">Раунд ${ex2R} — повтор ошибок (${ex2Q.length})</div>`:'';
  app.innerHTML=`<div class="screen">${rb}<div class="exhead"><span class="ex-num">Задание 2</span><span class="ex-title">Русские эквиваленты</span><span class="q-prog">${ex2i+1}/${ex2Q.length}</span></div><div class="qcard"><div class="qword">${escH(d.en)}</div><button class="speak-btn" onclick="speak(${JSON.stringify(d.en)})">🔊 Прослушать</button><div style="font-size:.82em;color:#64748b;margin-bottom:10px">Выбери правильный перевод:</div><div class="opts">${opts.map(o=>`<button class="opt" onclick="pickOpt2(this,'${encodeURIComponent(o)}','${encodeURIComponent(d.ru)}')">${escH(o)}</button>`).join('')}</div></div><div class="btn-row"><button class="big-btn-outline" onclick="showSetup()">← Назад</button></div></div>`;
}
function pickOpt2(btn,se,ce){ if(exAnswered) return; exAnswered=true; const s=decodeURIComponent(se),c=decodeURIComponent(ce); document.querySelectorAll('.opt').forEach(b=>{b.style.pointerEvents='none'; if(b.textContent===c)b.classList.add('ok');}); if(s===c){btn.classList.add('ok');ex2s++;}else{btn.classList.add('bad');ex2W.push(ex2Q[ex2i]);} setTimeout(()=>{ex2i++;exAnswered=false;if(ex2i<ex2Q.length)renderEx2();else showExDone(2,ex2s,ex2Q.length,ex2W);},1400); }

function showEx1Analysis(d){
  const a=d.analysis;
  const qtOpts=shuffle([...a.qtypeOpts]);
  const kwOpts=shuffle([...a.kwOpts]);
  app.innerHTML=`<div class="screen"><div class="round-badge">🔍 Разберём вопрос (Раунд ${ex1R})</div><div class="qcard"><div class="qtext">${escH(d.q)}</div><div id="ast1"><div class="analysis-q">❓ Что спрашивает этот вопрос?</div><div class="opts">${qtOpts.map(o=>`<button class="opt opt-sm" onclick="pickAType(this,'${encodeURIComponent(o)}','${encodeURIComponent(a.qtype)}')">${escH(o)}</button>`).join('')}</div></div><div id="ast2" class="hidden"><div class="analysis-q">🔑 Какое ключевое слово поможет найти ответ в тексте?</div><div class="opts">${kwOpts.map(w=>`<button class="opt opt-sm" onclick="pickAKw(this,'${encodeURIComponent(w)}','${encodeURIComponent(a.kw)}')">${escH(w)}</button>`).join('')}</div></div><div id="ast3" class="hidden"><div class="analysis-hint">💡 ${escH(a.tip)}</div><div class="btn-row"><button class="big-btn" onclick="ex1AnalysisDone=true;renderEx1()">→ Ответить на вопрос</button></div></div></div></div>`;
}
function pickAType(btn,se,ce){ const s=decodeURIComponent(se),c=decodeURIComponent(ce); document.querySelectorAll('#ast1 .opt').forEach(b=>{b.style.pointerEvents='none'; if(b.textContent===c)b.classList.add('ok');}); if(s===c)btn.classList.add('ok'); else btn.classList.add('bad'); setTimeout(()=>{ const el=document.getElementById('ast2'); if(el)el.classList.remove('hidden'); },900); }
function pickAKw(btn,se,ce){ const s=decodeURIComponent(se),c=decodeURIComponent(ce); document.querySelectorAll('#ast2 .opt').forEach(b=>{b.style.pointerEvents='none'; if(b.textContent===c)b.classList.add('ok');}); if(s===c)btn.classList.add('ok'); else btn.classList.add('bad'); setTimeout(()=>{ const el=document.getElementById('ast3'); if(el)el.classList.remove('hidden'); },900); }
function showEx2Hint(d){ app.innerHTML=`<div class="screen"><div class="round-badge">💡 Разберём термин (Раунд ${ex2R})</div><div class="qcard"><div class="qword">${escH(d.en)}</div><button class="speak-btn" onclick="speak(${JSON.stringify(d.en)})">🔊 Прослушать</button><div class="analysis-hint">${escH(d.tip)}</div><div class="btn-row"><button class="big-btn" onclick="ex2AnalysisDone=true;renderEx2()">→ Выбрать перевод</button></div></div></div>`; }

function renderEx3(){
  const d=ex3Q[ex3i];
  const rb=ex3R>1?`<div class="round-badge">Раунд ${ex3R} — повтор ошибок (${ex3Q.length})</div>`:'';
  app.innerHTML=`<div class="screen">${rb}<div class="exhead"><span class="ex-num">Задание 3</span><span class="ex-title">Словообразование</span><span class="q-prog">${ex3i+1}/${ex3Q.length}</span></div><div class="qcard"><div class="qword">${escH(d.word)}</div><div style="font-size:.82em;color:#64748b;text-align:center;margin-bottom:12px">Определи способ образования:</div><div class="cats"><button class="cat-btn cat-simple" onclick="pickCat('simple','${d.cat}','${encodeURIComponent(d.explain)}')">Простое<br><small style="opacity:.7">корень без аффиксов</small></button><button class="cat-btn cat-deriv" onclick="pickCat('deriv','${d.cat}','${encodeURIComponent(d.explain)}')">Производное<br><small style="opacity:.7">суффикс/префикс</small></button><button class="cat-btn cat-comp" onclick="pickCat('comp','${d.cat}','${encodeURIComponent(d.explain)}')">Сложное<br><small style="opacity:.7">два корня</small></button></div><div id="catRes"></div></div><div class="btn-row"><button class="big-btn-outline" onclick="showSetup()">← Назад</button></div></div>`;
  speak(d.word);
}
function pickCat(sel,correct,ee){ const e=decodeURIComponent(ee); document.querySelectorAll('.cat-btn').forEach(b=>b.style.pointerEvents='none'); const L={simple:'Простое',deriv:'Производное',comp:'Сложное'}; const ok=sel===correct; if(ok)ex3s++; else ex3W.push(ex3Q[ex3i]); document.getElementById('catRes').innerHTML=`<div class="cat-result ${ok?'ok':'bad'}">${ok?'✓ Правильно':'✗ Нет. Правильно: <b>'+L[correct]+'</b>'}. ${escH(e)}</div>`; setTimeout(()=>{ex3i++;if(ex3i<ex3Q.length)renderEx3();else showExDone(3,ex3s,ex3Q.length,ex3W);},1700); }

function renderEx4(){
  const d=ex4Q[ex4i]; exHints=0; ex4WasWrong=false;
  const rb=ex4R>1?`<div class="round-badge">Раунд ${ex4R} — повтор ошибок (${ex4Q.length})</div>`:'';
  app.innerHTML=`<div class="screen">${rb}<div class="exhead"><span class="ex-num">Задание 4</span><span class="ex-title">Заполни пропуск</span><span class="q-prog">${ex4i+1}/${ex4Q.length}</span></div><div class="qcard"><button class="speak-btn" onclick="speak(${JSON.stringify(d.audio)})">🔊 Прослушать предложение</button><div class="fill-sent">${escH(d.before)} <span class="fill-blank">_______</span> ${escH(d.after)}</div><div class="hint-box"><div class="hint-q">${escH(d.hint1)}</div><div class="hint-l" id="hintL"></div></div><div class="inp-row"><input class="inp" id="fillA" type="text" placeholder="Введи ответ..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkFill()"><button class="chk" onclick="checkFill()">Проверить</button></div><div id="fillR"></div></div><div class="btn-row"><button class="big-btn-outline" onclick="showSetup()">← Назад</button></div></div>`;
  document.getElementById('fillA').focus();
}
function checkFill(){ const d=ex4Q[ex4i]; const val=document.getElementById('fillA').value.trim().toLowerCase(); const correct=d.blank.toLowerCase(); const inp=document.getElementById('fillA'); if(val===correct){ inp.classList.add('ok'); if(!ex4WasWrong)ex4s++; else ex4W.push(d); document.getElementById('fillR').innerHTML='<div style="color:#4ade80;font-size:.88em;margin-top:8px">✓ Правильно!</div>'; document.querySelector('.fill-sent').innerHTML=`${escH(d.before)} <span style="color:#4ade80;font-weight:700">${escH(d.blank)}</span> ${escH(d.after)}`; setTimeout(()=>{ex4i++;exHints=0;if(ex4i<ex4Q.length)renderEx4();else showExDone(4,ex4s,ex4Q.length,ex4W);},1500); } else { ex4WasWrong=true; inp.classList.add('bad'); exHints++; if(exHints===1){ document.getElementById('fillR').innerHTML='<div style="color:#64748b;font-size:.84em;margin-top:8px">Попробуй ещё раз.</div>'; document.getElementById('hintL').textContent=d.hint2; } else { if(!ex4W.includes(d))ex4W.push(d); document.getElementById('fillR').innerHTML=`<div style="font-size:.84em;margin-top:8px">Ответ: <b style="color:#60a5fa">${escH(d.blank)}</b></div>`; setTimeout(()=>{ex4i++;exHints=0;if(ex4i<ex4Q.length)renderEx4();else showExDone(4,ex4s,ex4Q.length,ex4W);},2000); } setTimeout(()=>inp.classList.remove('bad'),600); } }

function showExDone(n,s,t,wrong){
  const pct=Math.round(s/t*100);
  const grade=pct===100?'🏆 Идеально!':pct>=80?'😎 Отлично!':pct>=60?'👍 Неплохо':pct>=40?'📖 Надо подтянуть':'💪 Попробуй ещё раз';
  const retryBtn=(wrong&&wrong.length>0)?`<button class="big-btn" style="background:linear-gradient(135deg,#f59e0b,#ef4444);animation:pulse 1.5s infinite" onclick="retryEx(${n})">🔁 Повторить ошибки (${wrong.length})</button>`:'';
  app.innerHTML=`<div class="screen"><div style="font-size:.85em;color:#64748b;margin-bottom:6px">Задание ${n} завершено</div><div class="result-big">${pct}%</div><div class="result-grade">${grade}</div><div style="font-size:.85em;color:#94a3b8;margin-bottom:16px">${s} из ${t} правильно</div><div class="btn-row">${retryBtn}</div><div class="btn-row"><button class="big-btn-outline" onclick="startEx(${n})">Начать заново</button>${n<4?`<button class="big-btn-outline" onclick="startEx(${n+1})">Задание ${n+1} →</button>`:''}<button class="big-btn-outline" onclick="showSetup()">← Назад</button></div></div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
showSetup();
</script>
</body>
</html>
